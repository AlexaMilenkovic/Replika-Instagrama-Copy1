services:

  # ─── Infrastructure ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "5002:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql-main
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: instagram_replika
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5000:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./authentication_service/db/auth_db.sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-follow:
    image: mysql:8.0
    container_name: mysql-follow
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: follow_service
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5001:3306"
    volumes:
      - mysql_follow_data:/var/lib/mysql
      - ./follow-service/sql/baza_followservice.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./follow-service/sql/baza_followservice_primeri.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Authentication (combined service) ───────────────────
  authentication:
    build: ./authentication_service
    image: alexa151/faks-projekat-pisibp:Authentication-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_DB_NAME: instagram_replika
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Follow service ───────────────────────────────────────
  follow-service:
    build:
      context: ./follow-service
      dockerfile: Dockerfile
    image: alexa151/faks-projekat-pisibp:FollowService-${IMAGE_TAG}
    container_name: follow-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql-follow
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: follow_service
      PORT: 3004
      USER_INFO_SERVICE_URL: http://user-info:3013
    depends_on:
      mysql-follow:
        condition: service_healthy

  # ─── Profile services ─────────────────────────────────────
  search:
    build: ./profile/search
    image: alexa151/faks-projekat-pisibp:Search-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      AUTH_SERVICE_URL: http://authentication:3001
    depends_on:
      mysql:
        condition: service_healthy
      authentication:
        condition: service_started

  user-follows:
    build: ./profile/userFollowing
    image: alexa151/faks-projekat-pisibp:UserFollows-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  users-following:
    build: ./profile/userFollowers
    image: alexa151/faks-projekat-pisibp:UsersFollowing-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  user-info:
    build: ./profile/userInfo
    image: alexa151/faks-projekat-pisibp:UserInfo-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  user-posts:
    build: ./profile/userPosts
    image: alexa151/faks-projekat-pisibp:UserPosts-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

  feed:
    build: ./feed
    image: alexa151/faks-projekat-pisibp:Feed-${IMAGE_TAG}
    restart: unless-stopped
    environment:
      DB_HOST: mysql-main
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy


volumes:
  mysql_data:
  mysql_follow_data: