services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  registration:
    build: ./authentication/registration
    image: alexa151/faks-projekat-pisibp:Registration-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_NAME: instagram_replika
      REDIS_URL: redis://redis:6379
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refreshsecret
    depends_on:
      - mysql
      - redis
    ports:
      - "3000:3000"

  auth:
    build: ./authentication/auth
    image: alexa151/faks-projekat-pisibp:Auth-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_NAME: instagram_replika
      REDIS_URL: redis://redis:6379
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refreshsecret
    depends_on:
      - mysql
      - redis
    ports:
      - "3001:3001"

  login:
    build: ./authentication/login
    image: alexa151/faks-projekat-pisibp:Login-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_NAME: instagram_replika
      REDIS_URL: redis://redis:6379
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refreshsecret
    depends_on:
      - mysql
      - redis
    ports:
      - "3002:3002"

  logout:
    build: ./authentication/logout
    image: alexa151/faks-projekat-pisibp:Logout-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_NAME: instagram_replika
      REDIS_URL: redis://redis:6379
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refreshsecret
    depends_on:
      - mysql
      - redis
    ports:
      - "3003:3003"
  
  search:
    build: ./profile/search
    image: alexa151/faks-projekat-pisibp:Search-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
    ports:
      - "3010:3010"

  user-follows:
    build: ./profile/userFollowing
    image: alexa151/faks-projekat-pisibp:UserFollows-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
    ports:
      - "3011:3011"

  users-following:
    build: ./profile/userFollowers
    image: alexa151/faks-projekat-pisibp:UsersFollowing-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
    ports:
      - "3012:3012"

  user-info:
    build: ./profile/userInfo
    image: alexa151/faks-projekat-pisibp:UserInfo-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
    ports:
      - "3013:3013"

  user-posts:
    build: ./profile/userPosts
    image: alexa151/faks-projekat-pisibp:UserPosts-${IMAGE_TAG}
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
    ports:
      - "3014:3014"
  feed:
    build: ./feed
    image: alexa151/faks-projekat-pisibp:Feed-${IMAGE_TAG}
    ports:
      - "3015:3015"
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: instagram_replika
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql

  # MySQL za follow-service
  # -------------------------------------------------------------------------
  mysql-follow:
    image: mysql:8.0
    container_name: instagram-mysql-follow
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: follow_service
    ports:
      - "3307:3306"
    volumes:
      - mysql-follow-data:/var/lib/mysql
      - ./follow-service/sql/baza_followservice.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./follow-service/sql/baza_followservice_primeri.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # follow-service (Node.js + Express, port 3004)
  follow-service:
    build:
      context: ./follow-service
      dockerfile: Dockerfile
    container_name: instagram-follow-service
    environment:
      DB_HOST: mysql-follow
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: follow_service
      PORT: 3004
      USER_INFO_SERVICE_URL: http://user-info:3013
    ports:
      - "3004:3004"
    depends_on:
      mysql-follow:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: instagram_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: instagram_replika
    ports:
      - "3300:3300"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
  mysql-follow-data: