name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ✅ Run on BOTH push and PR
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  # ✅ Detect which services changed
  detect-changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'authentication/auth/**'
            logout:
              - 'authentication/logout/**'
      - name: Build matrix of changed services
        id: set-matrix
        run: |
          SERVICES=()
          [ "${{ steps.filter.outputs.authentication }}" == "true" ] && SERVICES+=("authentication")
          [ "${{ steps.filter.outputs.logout }}" == "true" ] && SERVICES+=("logout")
          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -sc .)
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  # ✅ Single build job, runs once per changed service
  build-and-push:
    if: needs.detect-changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate timestamp
        id: timestamp
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push ${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ steps.timestamp.outputs.TAG }}
        run: |
          docker compose build ${{ matrix.service }}
          docker compose push ${{ matrix.service }}
