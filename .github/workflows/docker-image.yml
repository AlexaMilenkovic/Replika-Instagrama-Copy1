name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ✅ Run on BOTH push and PR
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  # ✅ Run ONLY on push to main
  build-and-push-docker:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate timestamp
        id: timestamp
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build all microservices with Docker Compose
        run: |
          export IMAGE_TAG=${{ steps.timestamp.outputs.TAG }}
          export DOCKER_USER=${{ secrets.DOCKER_USERNAME }}
          
          # Build all images defined in docker-compose.yml
          docker compose build --build-arg IMAGE_TAG=$IMAGE_TAG

      - name: Push all microservices to Docker Hub
        run: |
          docker compose push
